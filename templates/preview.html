<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Invoice Templates Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f0f0;padding:20px}
h1{text-align:center;margin-bottom:20px;color:#333}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;max-width:1400px;margin:0 auto}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.card h2{padding:14px 16px;font-size:14px;color:#666;background:#fafafa;border-bottom:1px solid #eee}
.card iframe{width:100%;height:500px;border:none;display:block}
</style></head><body>
<h1>📄 Invoice Templates</h1>
<div class="grid" id="grid"></div>
<script>
const templates=[
  {name:'1. Professional (current)',file:'tmpl-professional.html'},
  {name:'2. Minimal — Clean white, no colors, just text',file:'tmpl-minimal.html'},
  {name:'3. Elegant — Serif font, warm amber accent',file:'tmpl-elegant.html'},
  {name:'4. Modern — Left navy sidebar, two-column layout',file:'tmpl-modern.html'},
  {name:'5. Modern Teal — Same layout, teal palette',file:'tmpl-modern-teal.html'},
  {name:'6. Modern Terracotta — Same layout, warm clay palette',file:'tmpl-modern-terracotta.html'},
  {name:'7. Corporate — Dark header stripe, structured table',file:'tmpl-corporate.html'},
];
const grid=document.getElementById('grid');
templates.forEach(t=>{
  const div=document.createElement('div');div.className='card';
  div.innerHTML=`<h2>${t.name}</h2><iframe src="${t.file}"></iframe>`;
  grid.appendChild(div)
});
</script>
</body></html>
